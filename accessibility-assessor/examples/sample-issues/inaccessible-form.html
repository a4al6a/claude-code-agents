<!DOCTYPE html>
<!--
  Example: Inaccessible Form
  This file demonstrates common accessibility failures in form design.
  An accessibility-assessor agent would detect the issues annotated below.
-->
<html>
<!-- ISSUE: Missing lang attribute (SC 3.1.1, Serious) -->
<head>
  <!-- ISSUE: Missing page title (SC 2.4.2, Serious) -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- ISSUE: Viewport prevents zoom (SC 1.4.10, Critical) -->
  <style>
    body { font-family: sans-serif; margin: 40px; }
    .form-group { margin-bottom: 16px; }
    /* ISSUE: Focus outline removed globally (SC 2.4.7, Serious) */
    *:focus { outline: none; }
    .error { color: red; font-size: 12px; }
    /* ISSUE: Error color is sole indicator - no icon or text pattern (SC 1.4.1, Serious) */
    .submit-btn {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 8px 12px;
      /* ISSUE: Button too small for touch targets (SC 2.5.8, Moderate) */
      font-size: 14px;
      cursor: pointer;
    }
    /* ISSUE: Low contrast on secondary text (SC 1.4.3, Moderate) */
    .help-text { color: #AAAAAA; font-size: 12px; }
  </style>
</head>
<body>
  <!-- ISSUE: No skip navigation link (SC 2.4.1, Moderate) -->

  <!-- ISSUE: Heading hierarchy skip - no h1, starts at h3 (SC 1.3.1, Moderate) -->
  <h3>Contact Us</h3>

  <form>
    <div class="form-group">
      <!-- ISSUE: Input without associated label (SC 3.3.2, Critical) -->
      <!-- ISSUE: Missing autocomplete attribute (SC 1.3.5, Moderate) -->
      <input type="text" placeholder="Your Name">
      <span class="help-text">Required field</span>
    </div>

    <div class="form-group">
      <!-- ISSUE: Input without associated label (SC 3.3.2, Critical) -->
      <!-- ISSUE: Missing autocomplete="email" (SC 1.3.5, Moderate) -->
      <input type="text" placeholder="Email Address">
    </div>

    <div class="form-group">
      <!-- ISSUE: Input without associated label (SC 3.3.2, Critical) -->
      <!-- ISSUE: Missing autocomplete="tel" (SC 1.3.5, Moderate) -->
      <input type="text" placeholder="Phone Number">
    </div>

    <div class="form-group">
      <!-- ISSUE: Textarea without label (SC 3.3.2, Critical) -->
      <textarea rows="4" placeholder="Your message..."></textarea>
    </div>

    <div class="form-group">
      <!-- ISSUE: Error message not programmatically associated with input (SC 3.3.1, Serious) -->
      <!-- ISSUE: No aria-invalid on the errored input (SC 3.3.1, Serious) -->
      <input type="text" placeholder="Postal Code" style="border: 2px solid red;">
      <span class="error">Please enter a valid postal code</span>
    </div>

    <div class="form-group">
      <!-- ISSUE: Custom checkbox with no ARIA role or state (SC 4.1.2, Serious) -->
      <!-- ISSUE: Not keyboard accessible - div with onclick only (SC 2.1.1, Critical) -->
      <div class="custom-checkbox" onclick="this.classList.toggle('checked')">
        <span>I agree to the terms</span>
      </div>
    </div>

    <!-- ISSUE: Generic link text (SC 2.4.4, Moderate) -->
    <p>Read our privacy policy <a href="/privacy">here</a>.</p>

    <button type="submit" class="submit-btn">Submit</button>
  </form>

  <!-- ISSUE: Status message area without live region (SC 4.1.3, Serious) -->
  <div id="form-status"></div>

  <script>
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      // ISSUE: Dynamic content update not announced to screen readers
      document.getElementById('form-status').textContent = 'Form submitted successfully!';
    });
  </script>
</body>
</html>
